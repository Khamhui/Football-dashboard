<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>F1 Prediction Engine{% block title_suffix %}{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <nav>
    <div class="shell">
      <div class="nav-brand"><span>F1</span> Prediction Engine</div>
      <ul class="nav-links">
        <li><a href="/" class="{{ 'active' if request.endpoint == 'index' }}">Predictions</a></li>
        <li><a href="/results" class="{{ 'active' if request.endpoint == 'results' }}">Results</a></li>
        <li><a href="/standings" class="{{ 'active' if request.endpoint == 'standings' }}">Standings</a></li>
        <li><a href="/news" class="{{ 'active' if request.endpoint == 'news' }}">News</a></li>
      </ul>
      <div class="nav-right">
        <button class="theme-toggle" onclick="toggleTheme()">◐ Theme</button>
      </div>
    </div>
  </nav>

  <main class="shell">
    {% block content %}{% endblock %}
  </main>

  <script>
    // Theme persistence
    const html = document.documentElement;
    const saved = localStorage.getItem('theme');
    if (saved) html.setAttribute('data-theme', saved);

    function toggleTheme() {
      const next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
      html.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
    }
  </script>
  {% block scripts %}{% endblock %}
</body>
</html>
