{% extends "base.html" %}
{% block title_suffix %} — News{% endblock %}

{% block content %}
<div class="page-header">
  <h1>F1 News Feed</h1>
  <div class="subtitle">Latest from official sources</div>
</div>

<div class="card">
  <div id="news-feed">
    <div class="news-loading">Loading news from RSS feeds...</div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
fetch('/api/news')
  .then(r => r.json())
  .then(articles => {
    const feed = document.getElementById('news-feed');
    if (!articles.length) {
      feed.innerHTML = '<p class="dim">No articles found. Check your internet connection.</p>';
      return;
    }
    feed.innerHTML = articles.map(a => `
      <div class="news-item">
        <div class="news-source">${a.source}</div>
        <div class="news-title"><a href="${a.link}" target="_blank" rel="noopener">${a.title}</a></div>
        <div class="news-meta">${a.published}</div>
      </div>
    `).join('');
  })
  .catch(() => {
    document.getElementById('news-feed').innerHTML =
      '<p class="dim">Failed to load news. RSS feeds may be unavailable.</p>';
  });
</script>
{% endblock %}
