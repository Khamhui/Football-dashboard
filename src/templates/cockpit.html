<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FormulAI — Live Cockpit</title>
  <style>
    :root {
      --bg: #000000;
      --panel: #050505;
      --border: #1A1A1A;
      --text: #CCCCCC;
      --dim: #555555;
      --bright: #FFFFFF;
      --accent: #50C878;
      --red: #FF3355;
      --yellow: #FFCC00;
      --cyan: #00D4FF;
      --radius: 12px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'SF Mono', 'JetBrains Mono', 'Menlo', monospace;
      font-size: 11px;
      overflow: hidden;
      height: 100vh;
    }

    /* Layout: CSS Grid */
    .cockpit {
      display: grid;
      grid-template-columns: 1fr 320px;
      grid-template-rows: auto 1fr 240px;
      gap: 8px;
      padding: 8px;
      height: 100vh;
    }

    .header {
      grid-column: 1 / -1;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 12px;
      background: var(--panel);
      border: 0.5px solid var(--border);
      border-radius: var(--radius);
    }

    .header-title {
      font-size: 13px;
      font-weight: bold;
      color: var(--accent);
      letter-spacing: 1px;
    }

    .header-status {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .status-pill {
      font-size: 9px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 4px;
      letter-spacing: 0.5px;
    }

    .status-live { background: #00CC4422; color: var(--accent); border: 1px solid var(--accent); }
    .status-sc { background: #FFCC0022; color: var(--yellow); border: 1px solid var(--yellow); }
    .status-red { background: #FF335522; color: var(--red); border: 1px solid var(--red); }
    .status-clear { background: transparent; color: var(--dim); border: 1px solid var(--border); }

    /* Track Map */
    .track-map {
      grid-column: 1;
      grid-row: 2;
      background: var(--panel);
      border: 0.5px solid var(--border);
      border-radius: var(--radius);
      position: relative;
      overflow: hidden;
    }

    .track-map canvas {
      width: 100%;
      height: 100%;
    }

    /* Live Tower */
    .tower {
      grid-column: 2;
      grid-row: 2 / 4;
      background: var(--panel);
      border: 0.5px solid var(--border);
      border-radius: var(--radius);
      overflow-y: auto;
      padding: 10px;
    }

    .tower-title {
      font-size: 10px;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .tower-row {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 4px 0;
      border-bottom: 0.5px solid var(--border);
      transition: transform 0.5s ease;
    }

    .tower-pos {
      width: 22px;
      font-weight: 700;
      text-align: center;
    }

    .tower-pos.p1 { color: #FFD700; }
    .tower-pos.p2 { color: #C0C0C0; }
    .tower-pos.p3 { color: #CD7F32; }

    .tc {
      display: inline-block;
      width: 4px;
      height: 14px;
      border-radius: 1px;
      flex-shrink: 0;
    }

    .tower-code {
      font-weight: 600;
      width: 36px;
    }

    .tower-gap {
      color: var(--dim);
      font-size: 10px;
      margin-left: auto;
      min-width: 50px;
      text-align: right;
    }

    .tower-tire {
      font-size: 9px;
      padding: 1px 4px;
      border-radius: 3px;
      font-weight: 700;
      min-width: 14px;
      text-align: center;
    }

    .tire-soft { background: #DC000044; color: #FF4444; }
    .tire-medium { background: #FFCC0044; color: #FFCC00; }
    .tire-hard { background: #FFFFFF22; color: #FFFFFF; }
    .tire-intermediate { background: #00CC4422; color: var(--accent); }
    .tire-wet { background: #0090FF22; color: #0090FF; }

    .tower-pred {
      font-size: 9px;
      color: var(--dim);
      width: 24px;
      text-align: center;
    }

    .tower-pred.better { color: var(--accent); }
    .tower-pred.worse { color: var(--red); }

    /* Probability bars section */
    .tower-section {
      margin-top: 12px;
      padding-top: 8px;
      border-top: 0.5px solid var(--border);
    }

    .prob-row {
      display: flex;
      align-items: center;
      gap: 4px;
      margin-bottom: 4px;
    }

    .prob-label {
      width: 36px;
      font-size: 9px;
      font-weight: 600;
    }

    .prob-bar-wrap {
      flex: 1;
      height: 10px;
      background: #111;
      border-radius: 2px;
      overflow: hidden;
    }

    .prob-bar {
      height: 100%;
      border-radius: 2px;
      transition: width 1s ease;
    }

    .prob-val {
      width: 38px;
      text-align: right;
      font-size: 9px;
      color: var(--dim);
    }

    /* Driver Telemetry Panels */
    .telemetry-strip {
      grid-column: 1;
      grid-row: 3;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    .telem-panel {
      background: var(--panel);
      border: 0.5px solid var(--border);
      border-radius: var(--radius);
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .telem-header {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .telem-header select {
      background: var(--bg);
      color: var(--bright);
      border: 1px solid var(--border);
      border-radius: 4px;
      font-family: inherit;
      font-size: 11px;
      font-weight: 700;
      padding: 2px 6px;
      cursor: pointer;
      flex: 1;
    }

    .telem-header select:focus { outline: 1px solid var(--accent); }

    .telem-speed {
      font-size: 28px;
      font-weight: 900;
      color: var(--bright);
      line-height: 1;
    }

    .telem-speed-unit {
      font-size: 10px;
      color: var(--dim);
      margin-left: 2px;
    }

    .telem-gauge {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .gauge-row {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .gauge-label {
      width: 50px;
      font-size: 9px;
      color: var(--dim);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .gauge-bar-wrap {
      flex: 1;
      height: 8px;
      background: #111;
      border-radius: 2px;
      overflow: hidden;
    }

    .gauge-bar {
      height: 100%;
      border-radius: 2px;
      transition: width 0.3s ease;
    }

    .gauge-throttle { background: var(--accent); }
    .gauge-brake { background: var(--red); }
    .gauge-speed { background: var(--cyan); }

    .gauge-val {
      width: 32px;
      text-align: right;
      font-size: 10px;
      font-weight: 600;
    }

    .telem-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .telem-stat {
      text-align: center;
    }

    .telem-stat-label {
      font-size: 8px;
      color: var(--dim);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .telem-stat-value {
      font-size: 14px;
      font-weight: 700;
      color: var(--bright);
    }

    .drs-on, .overtake-on {
      color: var(--accent);
      font-weight: 700;
    }

    .drs-off, .overtake-off {
      color: var(--dim);
    }

    .gauge-battery {
      background: linear-gradient(90deg, var(--red) 0%, var(--yellow) 30%, var(--accent) 70%);
    }

    .tire-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 3px;
      margin-top: 4px;
    }

    .tire-cell {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 2px 4px;
      background: #0A0A0A;
      border-radius: 3px;
    }

    .tire-cell-label {
      font-size: 8px;
      font-weight: 700;
      color: var(--dim);
      width: 16px;
    }

    .tire-cell-temp {
      font-size: 9px;
      font-weight: 600;
      color: var(--bright);
    }

    .tire-cell-psi {
      font-size: 8px;
      color: var(--dim);
      margin-left: auto;
    }

    .delta-positive { color: var(--red); }
    .delta-negative { color: var(--accent); }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  </style>
</head>
<body>

<div class="cockpit">
  <!-- Header -->
  <div class="header">
    <span class="header-title">FORMULAI COCKPIT</span>
    <div class="header-status">
      <span id="lap-display" style="color:var(--dim)">LAP 0/0</span>
      <span id="track-status" class="status-pill status-clear">WAITING</span>
      <span id="weather-display" style="color:var(--dim)"></span>
    </div>
  </div>

  <!-- Track Map -->
  <div class="track-map">
    <canvas id="track-canvas"></canvas>
  </div>

  <!-- Live Tower -->
  <div class="tower">
    <div class="tower-title">Live Standings</div>
    <div id="tower-body"></div>
    <div class="tower-section">
      <div class="tower-title">Win Probability</div>
      <div id="prob-bars"></div>
    </div>
  </div>

  <!-- Telemetry Strip -->
  <div class="telemetry-strip">
    <div class="telem-panel" id="telem-0"></div>
    <div class="telem-panel" id="telem-1"></div>
    <div class="telem-panel" id="telem-2"></div>
  </div>
</div>

<script>
const TEAM_COLORS = {
  {% for team, hex in TEAM_COLORS_HEX.items() %}{{ team }}: '{{ hex }}'{% if not loop.last %}, {% endif %}{% endfor %},
  unknown: '#888888'
};

const ALL_DRIVERS = [
  {% for d in ALL_DRIVERS %}{num: {{ d.num }}, id: '{{ d.id }}', code: '{{ d.code }}', team: '{{ d.team }}'}{% if not loop.last %},{% endif %}
  {% endfor %}];

let trackedNums = [16, 1, 4];
let trackOutline = [];
let lastData = null;
let trackBounds = null;

// ── Track Map ──
const canvas = document.getElementById('track-canvas');
const ctx = canvas.getContext('2d');

function resizeCanvas() {
  const rect = canvas.parentElement.getBoundingClientRect();
  canvas.width = rect.width * devicePixelRatio;
  canvas.height = rect.height * devicePixelRatio;
  ctx.scale(devicePixelRatio, devicePixelRatio);
  canvas.style.width = rect.width + 'px';
  canvas.style.height = rect.height + 'px';
  trackBounds = null;
  if (lastData) drawTrackMap(lastData);
}
window.addEventListener('resize', resizeCanvas);

function computeTrackBounds() {
  const w = canvas.width / devicePixelRatio;
  const h = canvas.height / devicePixelRatio;
  let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
  for (const [x, y] of trackOutline) {
    if (x < minX) minX = x; if (x > maxX) maxX = x;
    if (y < minY) minY = y; if (y > maxY) maxY = y;
  }
  const rangeX = maxX - minX || 1;
  const rangeY = maxY - minY || 1;
  const pad = 40;
  const scale = Math.min((w - pad * 2) / rangeX, (h - pad * 2) / rangeY);
  const offX = (w - rangeX * scale) / 2;
  const offY = (h - rangeY * scale) / 2;
  return { minX, minY, scale, offX, offY, w, h };
}

function drawTrackMap(data) {
  const w = canvas.width / devicePixelRatio;
  const h = canvas.height / devicePixelRatio;
  ctx.clearRect(0, 0, w, h);

  if (!trackOutline.length) return;

  if (!trackBounds) trackBounds = computeTrackBounds();
  const { minX, minY, scale, offX, offY } = trackBounds;

  function tx(x) { return (x - minX) * scale + offX; }
  function ty(y) { return h - ((y - minY) * scale + offY); }

  // Draw track outline
  ctx.strokeStyle = '#1A1A1A';
  ctx.lineWidth = 16;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  ctx.beginPath();
  trackOutline.forEach(([x, y], i) => i === 0 ? ctx.moveTo(tx(x), ty(y)) : ctx.lineTo(tx(x), ty(y)));
  ctx.closePath();
  ctx.stroke();

  ctx.strokeStyle = '#2A2A2A';
  ctx.lineWidth = 12;
  ctx.beginPath();
  trackOutline.forEach(([x, y], i) => i === 0 ? ctx.moveTo(tx(x), ty(y)) : ctx.lineTo(tx(x), ty(y)));
  ctx.closePath();
  ctx.stroke();

  // Draw car dots
  const locs = data.locations || [];
  const trackedIds = new Set(trackedNums.map(n => ALL_DRIVERS.find(d => d.num === n)?.id));

  for (const loc of locs) {
    if (loc.x == null || loc.y == null) continue;
    const isTracked = trackedIds.has(loc.id);
    const color = TEAM_COLORS[loc.team] || '#888';
    const cx = tx(loc.x);
    const cy = ty(loc.y);

    ctx.beginPath();
    ctx.arc(cx, cy, isTracked ? 7 : 4, 0, Math.PI * 2);
    ctx.fillStyle = color;
    ctx.fill();

    if (isTracked) {
      ctx.strokeStyle = '#000';
      ctx.lineWidth = 2;
      ctx.stroke();
      ctx.font = 'bold 10px SF Mono, Menlo, monospace';
      ctx.fillStyle = '#fff';
      ctx.textAlign = 'center';
      ctx.fillText(loc.code, cx, cy - 12);
    }
  }
}

// ── Fetch track outline ──
fetch('/live/track').then(r => r.json()).then(d => {
  trackOutline = d.outline || [];
  trackBounds = null;
  resizeCanvas();
});

// ── Tower ──
function renderTower(data) {
  const predictions = data.predictions || [];
  const liveProbs = data.live_probabilities || [];

  // Sort by position
  let drivers = (data.locations || []).slice().sort((a, b) => a.position - b.position);

  // Build pre-race prediction lookup
  const predLookup = {};
  predictions.forEach((p, i) => { predLookup[p.driver_id] = i + 1; });

  // Build live prob lookup
  const probLookup = {};
  liveProbs.forEach(p => { probLookup[p.driver_id] = p; });

  // Stint info from predictions
  const stintLookup = {};
  predictions.forEach(p => {
    stintLookup[p.driver_id] = { compound: p.tire_compound || 'unknown', age: p.tire_age || 0 };
  });
  // Override from live_probabilities
  liveProbs.forEach(p => {
    stintLookup[p.driver_id] = { compound: p.tire_compound || 'unknown', age: p.tire_age || 0 };
  });

  let html = '';
  for (const d of drivers) {
    const pos = d.position;
    const posClass = pos <= 3 ? ' p' + pos : '';
    const color = TEAM_COLORS[d.team] || '#888';
    const predPos = predLookup[d.id];
    const stint = stintLookup[d.id] || {};
    const compound = (stint.compound || 'unknown').toLowerCase();
    const tireClass = 'tire-' + (compound === 'unknown' ? 'medium' : compound);

    // Gap
    const prob = probLookup[d.id];
    const gap = prob ? prob.gap_to_leader : null;
    const gapStr = pos === 1 ? 'LEADER' : (gap != null ? '+' + gap.toFixed(1) + 's' : '');

    // Pred vs actual
    let predHtml = '';
    if (predPos) {
      const diff = predPos - pos;
      const cls = diff > 0 ? 'better' : diff < 0 ? 'worse' : '';
      predHtml = '<span class="tower-pred ' + cls + '">' + (diff > 0 ? '▲' : diff < 0 ? '▼' : '=') + '</span>';
    }

    html += '<div class="tower-row">';
    html += '<span class="tower-pos' + posClass + '">' + pos + '</span>';
    html += '<span class="tc" style="background:' + color + '"></span>';
    html += '<span class="tower-code" style="color:' + (pos <= 3 ? '#fff' : 'var(--text)') + '">' + d.code + '</span>';
    html += '<span class="tower-tire ' + tireClass + '">' + compound[0].toUpperCase() + (stint.age || '') + '</span>';
    html += predHtml;
    html += '<span class="tower-gap">' + gapStr + '</span>';
    html += '</div>';
  }

  document.getElementById('tower-body').innerHTML = html;

  // Win probability bars (top 5)
  const topProbs = liveProbs
    .filter(p => p.live_win_prob > 0)
    .sort((a, b) => b.live_win_prob - a.live_win_prob)
    .slice(0, 5);

  let probHtml = '';
  const maxProb = topProbs[0]?.live_win_prob || 1;
  for (const p of topProbs) {
    const color = TEAM_COLORS[probLookup[p.driver_id]?.team || 'unknown'] || TEAM_COLORS.unknown;
    const code = ALL_DRIVERS.find(d => d.id === p.driver_id)?.code || '???';
    const pct = (p.live_win_prob * 100).toFixed(1);
    const barW = (p.live_win_prob / maxProb * 100).toFixed(1);
    probHtml += '<div class="prob-row">';
    probHtml += '<span class="prob-label">' + code + '</span>';
    probHtml += '<div class="prob-bar-wrap"><div class="prob-bar" style="width:' + barW + '%;background:' + color + '"></div></div>';
    probHtml += '<span class="prob-val">' + pct + '%</span>';
    probHtml += '</div>';
  }
  document.getElementById('prob-bars').innerHTML = probHtml;
}

// ── Telemetry Panels ──
function initTelemPanels() {
  telemEls[0] = telemEls[1] = telemEls[2] = null;
  for (let i = 0; i < 3; i++) {
    const panel = document.getElementById('telem-' + i);
    const d = ALL_DRIVERS.find(d => d.num === trackedNums[i]) || ALL_DRIVERS[i];

    let opts = ALL_DRIVERS.map(dr =>
      '<option value="' + dr.num + '"' + (dr.num === trackedNums[i] ? ' selected' : '') + '>' +
      dr.code + ' — ' + dr.team.replace('_', ' ') + '</option>'
    ).join('');

    panel.innerHTML =
      '<div class="telem-header">' +
        '<span class="tc" style="background:' + (TEAM_COLORS[d.team] || '#888') + ';height:20px" id="telem-tc-' + i + '"></span>' +
        '<select id="telem-picker-' + i + '" onchange="changeTracked(' + i + ', this.value)">' + opts + '</select>' +
      '</div>' +
      '<div><span class="telem-speed" id="telem-speed-' + i + '">0</span><span class="telem-speed-unit">KM/H</span></div>' +
      '<div class="telem-gauge">' +
        '<div class="gauge-row"><span class="gauge-label">Throttle</span><div class="gauge-bar-wrap"><div class="gauge-bar gauge-throttle" id="telem-throttle-' + i + '" style="width:0%"></div></div><span class="gauge-val" id="telem-throttle-val-' + i + '">0%</span></div>' +
        '<div class="gauge-row"><span class="gauge-label">Brake</span><div class="gauge-bar-wrap"><div class="gauge-bar gauge-brake" id="telem-brake-' + i + '" style="width:0%"></div></div><span class="gauge-val" id="telem-brake-val-' + i + '">OFF</span></div>' +
        '<div class="gauge-row"><span class="gauge-label">Battery</span><div class="gauge-bar-wrap"><div class="gauge-bar gauge-battery" id="telem-battery-' + i + '" style="width:0%"></div></div><span class="gauge-val" id="telem-battery-val-' + i + '">—</span></div>' +
      '</div>' +
      '<div class="telem-row">' +
        '<div class="telem-stat"><div class="telem-stat-label">Gear</div><div class="telem-stat-value" id="telem-gear-' + i + '">0</div></div>' +
        '<div class="telem-stat"><div class="telem-stat-label">Overtake</div><div class="telem-stat-value" id="telem-overtake-' + i + '">OFF</div></div>' +
        '<div class="telem-stat"><div class="telem-stat-label">Tire</div><div class="telem-stat-value" id="telem-tire-' + i + '">—</div></div>' +
        '<div class="telem-stat"><div class="telem-stat-label">Delta</div><div class="telem-stat-value" id="telem-delta-' + i + '">—</div></div>' +
      '</div>' +
      '<div class="tire-grid" id="telem-tire-grid-' + i + '">' +
        '<div class="tire-cell"><span class="tire-cell-label">FL</span><span class="tire-cell-temp" id="telem-tfl-' + i + '">—</span><span class="tire-cell-psi" id="telem-pfl-' + i + '">—</span></div>' +
        '<div class="tire-cell"><span class="tire-cell-label">FR</span><span class="tire-cell-temp" id="telem-tfr-' + i + '">—</span><span class="tire-cell-psi" id="telem-pfr-' + i + '">—</span></div>' +
        '<div class="tire-cell"><span class="tire-cell-label">RL</span><span class="tire-cell-temp" id="telem-trl-' + i + '">—</span><span class="tire-cell-psi" id="telem-prl-' + i + '">—</span></div>' +
        '<div class="tire-cell"><span class="tire-cell-label">RR</span><span class="tire-cell-temp" id="telem-trr-' + i + '">—</span><span class="tire-cell-psi" id="telem-prr-' + i + '">—</span></div>' +
      '</div>';
  }
}

const telemEls = [null, null, null];

function cacheTelemEls(i) {
  telemEls[i] = {
    tc: document.getElementById('telem-tc-' + i),
    speed: document.getElementById('telem-speed-' + i),
    throttle: document.getElementById('telem-throttle-' + i),
    throttleVal: document.getElementById('telem-throttle-val-' + i),
    brake: document.getElementById('telem-brake-' + i),
    brakeVal: document.getElementById('telem-brake-val-' + i),
    battery: document.getElementById('telem-battery-' + i),
    batteryVal: document.getElementById('telem-battery-val-' + i),
    gear: document.getElementById('telem-gear-' + i),
    overtake: document.getElementById('telem-overtake-' + i),
    tire: document.getElementById('telem-tire-' + i),
    delta: document.getElementById('telem-delta-' + i),
    tfl: document.getElementById('telem-tfl-' + i),
    tfr: document.getElementById('telem-tfr-' + i),
    trl: document.getElementById('telem-trl-' + i),
    trr: document.getElementById('telem-trr-' + i),
    pfl: document.getElementById('telem-pfl-' + i),
    pfr: document.getElementById('telem-pfr-' + i),
    prl: document.getElementById('telem-prl-' + i),
    prr: document.getElementById('telem-prr-' + i),
  };
}

function updateTelemPanels(telemetry) {
  for (let i = 0; i < 3; i++) {
    const driverNum = trackedNums[i];
    const driver = ALL_DRIVERS.find(d => d.num === driverNum);
    if (!driver) continue;

    const t = telemetry[driver.id];
    if (!t) continue;

    if (!telemEls[i]) cacheTelemEls(i);
    const els = telemEls[i];

    if (els.tc) els.tc.style.background = TEAM_COLORS[t.team] || '#888';

    els.speed.textContent = t.speed ?? 0;

    const throttle = t.throttle ?? 0;
    els.throttle.style.width = throttle + '%';
    els.throttleVal.textContent = throttle + '%';

    const brakeVal = typeof t.brake === 'number' ? t.brake : (t.brake ? 100 : 0);
    els.brake.style.width = brakeVal + '%';
    els.brakeVal.textContent = brakeVal > 0 ? brakeVal + '%' : 'OFF';
    els.brakeVal.style.color = brakeVal > 0 ? 'var(--red)' : 'var(--dim)';

    // Battery SOC
    if (t.battery_soc >= 0) {
      els.battery.style.width = t.battery_soc + '%';
      els.batteryVal.textContent = Math.round(t.battery_soc) + '%';
    } else {
      els.battery.style.width = '0%';
      els.batteryVal.textContent = '—';
    }

    // Gear + Overtake
    els.gear.textContent = t.gear || 'N';
    els.overtake.textContent = t.overtake_active ? 'ACTIVE' : 'OFF';
    els.overtake.className = 'telem-stat-value ' + (t.overtake_active ? 'overtake-on' : 'overtake-off');

    // Tire compound + age
    const compound = (t.tire_compound || '?')[0].toUpperCase();
    els.tire.textContent = compound + (t.tire_age ?? 0);

    // Lap delta
    const delta = t.lap_delta;
    if (delta && delta !== 0) {
      const sign = delta > 0 ? '+' : '';
      els.delta.textContent = sign + delta.toFixed(3);
      els.delta.className = 'telem-stat-value ' + (delta > 0 ? 'delta-positive' : 'delta-negative');
    } else {
      els.delta.textContent = '—';
      els.delta.className = 'telem-stat-value';
    }

    // Tire pressures and temps (from F1 Live Timing)
    const tp = t.tire_pressures || {};
    const tt = t.tire_temps || {};
    for (const corner of ['fl', 'fr', 'rl', 'rr']) {
      const temp = tt[corner];
      const psi = tp[corner];
      els['t' + corner].textContent = (temp != null && temp > 0) ? Math.round(temp) + '°' : '—';
      els['p' + corner].textContent = (psi != null && psi > 0) ? psi.toFixed(1) : '—';
    }
  }
}

function changeTracked(slot, driverNum) {
  trackedNums[slot] = parseInt(driverNum);
  telemEls[slot] = null;
  fetch('/live/tracked', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({drivers: trackedNums})
  });
}

// ── SSE Stream ──
function connectSSE() {
  const es = new EventSource('/live/stream');
  es.onmessage = function(e) {
    const data = JSON.parse(e.data);
    if (data.status === 'no_change' || data.status === 'waiting') return;

    lastData = data;

    // Header
    document.getElementById('lap-display').textContent =
      'LAP ' + data.lap + '/' + data.total_laps;

    const statusEl = document.getElementById('track-status');
    const st = data.track_status || 'clear';
    if (st === 'sc') statusEl.textContent = 'SAFETY CAR';
    else if (st === 'vsc') statusEl.textContent = 'VSC';
    else if (st === 'red') statusEl.textContent = 'RED FLAG';
    else statusEl.textContent = data.lap > 0 ? 'LIVE' : 'WAITING';
    statusEl.className = 'status-pill status-' + (data.lap > 0 && st === 'clear' ? 'live' : st);

    const weatherEl = document.getElementById('weather-display');
    if (data.air_temp != null) {
      const trackTemp = data.track_temp != null ? data.track_temp.toFixed(0) : '—';
      weatherEl.textContent = 'Air ' + data.air_temp.toFixed(0) + '°C | Track ' + trackTemp + '°C' + (data.rainfall ? ' | 🌧' : '');
    }

    // Track map
    drawTrackMap(data);

    // Tower
    renderTower(data);

    // Telemetry
    if (data.telemetry) {
      updateTelemPanels(data.telemetry);
    }
  };

  es.onerror = function() {
    es.close();
    setTimeout(connectSSE, 3000);
  };
}

// ── Init ──
initTelemPanels();
resizeCanvas();
connectSSE();
</script>
